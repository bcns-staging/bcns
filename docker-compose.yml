services:
  # Hot-reloading dev server: docker compose up dev
  dev:
    image: node:22-alpine
    working_dir: /app
    # Trust any extra CA cert mounted from certs/ (see README "Local Docker
    # builds behind SSL-inspecting proxies") before installing deps.
    command: sh -c "for f in /certs/*.crt; do [ -f \"$$f\" ] && cat \"$$f\" >> /etc/ssl/certs/ca-certificates.crt; done; npm ci && npm run dev -- --host"
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./certs:/certs:ro
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--use-system-ca

  # Production-like build served by nginx, same artifact GitHub Pages will serve.
  # docker compose up --build prod
  prod:
    build:
      context: .
      target: runtime
    ports:
      - "8080:80"

volumes:
  node_modules:
